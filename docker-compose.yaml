services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    ports:
      - "18789:18789"
    volumes:
      # Bind mount so we can manage OpenClaw state from host
      - ./.openclaw:/home/node/.openclaw
    environment:
      # Gateway configuration
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_GATEWAY_MODE: local
      # Optional: Set your gateway token here
      # OPENCLAW_GATEWAY_TOKEN: your-token-here
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - openclaw-network

  mission-control:
    image: ghcr.io/builderz-labs/mission-control:latest
    container_name: mission-control
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # Mission Control data (SQLite DB, token logs, etc.)
      - mission-control-data:/app/.data
      # OpenClaw integration (read-only access to shared state)
      - ./.openclaw:/home/node/.openclaw
    environment:
      # Mission Control data directory
      # MISSION_CONTROL_DATA_DIR: /app/.data

      # OpenClaw gateway connection
      OPENCLAW_GATEWAY_HOST: ${OPENCLAW_GATEWAY_HOST:-host.docker.internal}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}

      # Browser WebSocket access (localhost for host browser, container name for server)
      NEXT_PUBLIC_GATEWAY_HOST: localhost
      # NEXT_PUBLIC_GATEWAY_PORT: 18789

      # Admin credentials (auto-generated if unset)
      # AUTH_USER: admin
      # AUTH_PASS: ${MC_PASSWORD:-}
      # API_KEY: ${MC_API_KEY:-}

      # Production security
      # MC_ALLOWED_HOSTS: localhost,127.0.0.1
      # NODE_ENV: production

      # Claude integration (optional)
      # MC_CLAUDE_HOME: ${HOME}/.claude

      # Logging
      LOG_LEVEL: debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - openclaw-network

volumes:
  mission-control-data:

networks:
  openclaw-network:
    driver: bridge